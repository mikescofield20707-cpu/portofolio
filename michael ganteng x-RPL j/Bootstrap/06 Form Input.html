<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <title>Hello, world!</title>
  </head>
  <body>
    <h1 class="text-center">Hello, world!</h1>
<div class="container">
  <form>    
      <div class="mb-3">
      <label for="exampleInputEmail1" class="form-label">Email address</label>
      <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
    </div> 
    <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Email address</label>
    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
  </div>
    <div class="mb-3">
      <label for="exampleInputPassword1" class="form-label">Password</label>
      <input type="password" class="form-control" id="exampleInputPassword1">
    </div>
    Jenis Kelamin
    <div class="form-check">
      <input class="form-check-input" type="radio" name="gender" id="Laki-laki">
      <label class="form-check-label" for="Laki-laki">
        Laki-laki
      </label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="radio" name="gender" id="Perempuan" checked>
      <label class="form-check-label" for="Perempuan">
        Perempuan
      </label>
    </div>
    Jurusan
    <select class="form-select" aria-label="Default select example">
      <option selected>Pilih Jurusan</option>
      <option value="RPl">Rekayasa Perangkat Lunak</option>
      <option value="Tkj">Teknik Komputer Jaringan</option>
      <option value="Tsm">Teknik Sepeda Motor</option>
      <option value="Fkk">Farmasi Klinis Dan Komunikasi</option>
      <option value="Ap">Perhotelan</option>
      <option value="Tb">Tata Boga</option>
      <option value="Akun">Akuntansi Dan Keuangan Lembaga</option>
      <option value="Otkp">Otomatisasi Dan Tata Kelola Perkantoran</option>
    </select>
    Hobby
    <div class="form-check">
      <input class="form-check-input" type="checkbox" value="" id="Traveling">
      <label class="form-check-label" for="Traveling">
        Traveling
      </label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="checkbox" value="" id="Nonton" checked>
      <label class="form-check-label" for="Nonton">
        Nonton
      </label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="checkbox" value="" id="Makan">
      <label class="form-check-label" for="Makan">
        Makan
      </label>
    </div>
    <div class="form-check">
      <input class="form-check-input" type="checkbox" value="" id="CheckMeOut">
      <label class="form-check-label" for="CheckMeOut">
        Check me out
      </label>
    </div>
    Kebiasaan Olahraga
    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" id="flexSwitchCheckDefault">
      <label class="form-check-label" for="flexSwitchCheckDefault">Jalan Pagi</label>
    </div>
    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" id="flexSwitchCheckChecked" checked>
      <label class="form-check-label" for="flexSwitchCheckChecked">Renang</label>
    </div>
    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" id="flexSwitchCheckDisabled" disabled>
      <label class="form-check-label" for="flexSwitchCheckDisabled">Bersepedah</label>
    </div>
    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" id="flexSwitchCheckCheckedDisabled" checked disabled>
      <label class="form-check-label" for="flexSwitchCheckCheckedDisabled">Lari Pagi</label>
    </div>
    <button type="submit" class="btn btn-primary">Submit</button>
  </form>
</div>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="js/bootstrap.bundle.min.js"></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="js/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    -->
  </body>
</html>
