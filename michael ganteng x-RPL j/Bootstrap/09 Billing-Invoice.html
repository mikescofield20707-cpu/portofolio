
<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
<link rel="stylesheet"  href="css/style-js.css">
    <title>Biling System</title>
  </head>

  <body>
    <div class="container-fluid">
        <div class="card">
          <div class="card-body pt-0">

                <!--Header-->
                <nav class="navbar p-0 mb-3 navbar-light bg-light">
                    <div class="heading-text">
                        <p><b><u>Biling System</u></b></p>
                </nav>

                <!--Product Information-->
                <div class="row">

        <div class="col-md-5 px-0 form-container card-height">
          <label class="label-text"><b>Product Information</b></label>

          <form class="px-3">
            <div class="mb-3">
              <label class="form-label">Item Name</label>
              <input type="text" class="form-control" id="item-name">
            </div>

            <div class="mb-3">
                <label class="form-label">Item Quantity</label>
                <input type="text" class="form-control" id="item-quantity">
              </div>

              <div class="mb-3">
                <label class="form-label">Item Price</label>
                <input type="text" class="form-control" id="item-price">
              </div>

              <div class="mb-3">
                <label class="form-label">diskon</label>
                <input type="text" class="form-control" id="item-discount">
              </div>

              
                  <button type="button" class="btn btn-primary" onclick="addItems()">Add</button>
              </form>
              </div>

                        <!--Biling Information-->

        <div class="col-md-7">
            <div class="card-height">
              <label class="label-text"><b>Biling Information</b></label>
              <table class="table table-bordered table-hover" id="biling-table">
                <thead class="table">
                    <tr>
                    <th scope="col">Item Name</th>
                    <th scope="col">Item Quantity</th>
                    <th scope="col">Item price</th>
                    <th scope="col">diskon</th>
                    <th scope="col">harga diskon</th>                        
                    </tr>
                </thead>
                <tbody>

                </tbody>

              </table>
            </div>
            <div class="mt-3 price-text" id="total-price">Billing Amount : 0.00</div>
            <div class="back mt-3" id="total-price"><a class="backtext" href="../index.html">Back To Mike Page</a></div>
          </div>

                </div>

             </div>
          </div>
        </div>
    </div>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="js/Script11.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    -->
  </body>
</html>
