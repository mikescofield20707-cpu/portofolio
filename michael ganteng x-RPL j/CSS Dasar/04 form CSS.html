<!DOCTYPE html>
<html>
 <head>
     <title>X RPL MICHAEL | Form Use CSS</title>
     <link rel="stylesheet" type="text/css" href="../CSS Dasar/css/css form.css">
 </head>
<body>
<div class="container">
   <h1>Form Input</h1>
   <form>
      <label for="nama"><b>Nama-Lengkap</b></label>
      <input style type="text" name="Nama" id="Nama" placeholder="Isi Nama Lengkap">
      <label for="pass"><b>Password</b></label>
      <input type="text" name="pass" id="pass" placeholder="Isi Password"><br>
      <label for="email"><b>E-mail</b></label>
      <input type="email" name="email" id="email" placeholder="Masukkan Email"><br>
      <label for="link"><b>Link</b></label>
      <input type="link" name="link" id="link" placeholder="Paste Link"><br>
      <label for="time"><b>Jam</b></label>
      <input type="time" name="time" id="time">
      <td><button name="input"><span style="color:rgb(255, 255, 255)">Kirim</span></button></td>
      <td><button name="input"><span style="color:rgb(255, 255, 255)">Cancel</span></button></td>
   </form>
</div>
</body>
</html>
