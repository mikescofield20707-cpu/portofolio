<!DOCTYPE html>
<html>
 <head>
     <title>X RPL MICHAEL | Form Use CSS UPDATE</title>
     <link rel="stylesheet" type="text/css" href="css/css terbaru.css">
     <meta name="viewport" content="width=device-width, initial-scale=1">
 </head>
<body>
    <div class="container">
        <h3>Data Informasi Instalasi Poliklinik | </h3>
            <div class="row">
                <div class="a1">
                    <label for="nama">Nama Instalasi</label>
                </div>
                <div class="a2">
                     <input type="text" name="nama" id="nama" placeholder="Isi Nama Instalasi">
                </div>
            </div>
            <div class="row">
                <div class="a1">
                    <label for="deskripsi">Deskripsi</label>
                </div>
                <div class="a2">
                        <textarea name="deskripsi" id="deskripsi" cols="30" rows="3" placeholder="Isi Deskripsi Instalasi"></textarea>
                </div>
            </div>
            <div class="row">
                <div class="a1">
                    <label for="alamat">Alamat</label>
                </div>
                <div class="a2">
                    <textarea name="alamat" id="alamat" cols="30" rows="3" placeholder="Isi Alamat Anda"></textarea>
                </div>
            </div>
            <div class="row">
                <div class="a1">
                    <label for="kecamatan">Kecamatan</label>
                </div>
                <div class="a2">
                     <input type="text" name="kecamatan" id="kecamatan" placeholder="Isi Kecamatan">
                </div>
            </div>
            <div class="row">
                <div class="a1">
                    <label for="kabupaten">Kabupaten</label>
                </div>
                <div class="a2">
                     <input type="text" name="kabupaten" id="kabupaten" placeholder="Isi Kabupaten">
                </div>
            </div>
            <div class="row">
                <div class="a1">
                    <label for="provinsi">Provinsi</label>
                </div>
                <div class="a2">
                     <input type="text" name="provinsi" id="provinsi" placeholder="Isi Provinsi">
                </div>
            </div><div class="row">
                <div class="a1">
                    <label for="pos">Kode Pos</label>
                </div>
                <div class="a2">
                     <input type="text" name="pos" id="pos" placeholder="Isi Kode Pos">
                </div>
            </div><div class="row">
                <div class="a1">
                    <label for="tel">Nomor Telepon</label>
                </div>
                <div class="a2">
                     <input type="text" name="tel" id="tel" placeholder="Isi Nomor Telepon">
                </div>
            </div><div class="row">
                <div class="a1">
                    <label for="email">E-mail</label>
                </div>
                <div class="a2">
                     <input type="email" name="email" id="email" placeholder="Isi E-mail">
                </div>
            </div>
            <div class="row">
                <div class="a1">
                    <span></span>
                </div>
                <div class="a2">
                    <input type="submit" value="Perbaharui Informasi" class="info">
                </div>
            </div>
            <div class="row">
                <div class="a1">
                    <span>Foto Sebelumnya</span>
                </div>
                <div class="a2">
                    <img src="15-2-minecraft-logo-png.png">
                </div>
            </div>
            <div class="row">
                <div class="a1">
                    <label for="foto">Perbaharui Foto</label>
                </div>
                <div class="a2">
                     <input type="file" name="foto" id="foto">
                </div>
            </div>
            <div class="row">
                <div class="a1">
                    <span></span>
                </div>
                <div class="a2">
                    <input type="submit" value="Perbaharui Logo" class="logo" >
                </div>
            </div>
        </div>
    </body>
    </html>
