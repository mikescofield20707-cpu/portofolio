<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>404 | Inti Synergy Mandiri</title>

  <link rel="stylesheet" href="assets/css/error.css" />
  <link rel="stylesheet" href="assets/css/error-animation.css" />
</head>
<body>

  <div class="sky-bg">
    <div class="sky-layer sky-blue"></div>
    <div class="sky-layer sky-red"></div>
    <div class="stars stars-one"></div>
    <div class="stars stars-two"></div>

    <div class="moon-wrap">
      <div class="moon"></div>
    </div>
  </div>

  <main class="lost-page">
    <section class="lost-card">

      <header class="lost-brand">
        <a href="index.html" class="brand-link">
          <span class="brand-logo">
            <img src="assets/img/logo.png" alt="Inti Synergy Mandiri Logo">
          </span>

          <span class="brand-text">
            <strong>ISM</strong>
            <small>Inti Synergy Mandiri</small>
          </span>
        </a>
      </header>

      <section class="lost-hero">

        <div class="error-number" aria-label="404">
          <span>4</span>
          <span>0</span>
          <span>4</span>
        </div>

        <div class="earth-wrap" aria-hidden="true">
          <div class="earth-glow"></div>

          <div class="earth">
            <span class="earth-line line-a"></span>
            <span class="earth-line line-b"></span>
            <span class="earth-line line-c"></span>
            <span class="earth-line line-d"></span>

            <span class="earth-orbit orbit-a"></span>
            <span class="earth-orbit orbit-b"></span>
            <span class="earth-orbit orbit-c"></span>

            <span class="earth-dot dot-a"></span>
            <span class="earth-dot dot-b"></span>
            <span class="earth-dot dot-c"></span>
          </div>
        </div>

        <div class="lost-copy">
          <span class="lost-kicker">route disconnected</span>

          <h1>Sorry for the lost file</h1>

          <p>
            Halaman yang kamu cari belum ditemukan, mungkin link-nya berubah,
            filenya belum dibuat, atau rutenya belum tersambung ke sistem ISM.
          </p>

          <a href="index.html" class="go-back-btn">
            Go Back
          </a>
        </div>

      </section>

    </section>
  </main>

</body>
</html>
