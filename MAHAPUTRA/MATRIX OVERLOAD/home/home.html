<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MATRIX OVERLOAD</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }
    
    body {
      background-color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .intro-container {
      text-align: center;
      opacity: 0;
      animation: fadeIn 2s ease forwards;
      transition: transform 1.5s ease;
    } 

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      color: white;
    }

    h1 {
      font-size: 3em;
      color: white;
      margin-bottom: 20px;
    }

    #namaInput {
      padding: 10px;
      font-size: 1em;
      border: 2px solid white;
      border-radius: 5px;
      color: white;
      background: transparent;
      width: 200px;
      text-align: center;
      outline: none;
      margin-bottom: 20px;
    }

    .play-button {
      padding: 10px 20px;
      font-size: 1em;
      font-weight: bold;
      background-color: black;
      color: white;
      border: 2px solid white;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    .play-button:hover {
      background-color: white;
      color: black;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }


    .particle {
      position: absolute;
      width: 5px;
      height: 5px;
      background-color: #0ff;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.8), 0 0 20px rgba(0, 255, 255, 0.6), 0 0 30px rgba(0, 255, 255, 0.4);
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      0% {
        transform: scale(1);
        opacity: 0.7;
      }
      100% {
        transform: scale(1.5);
        opacity: 1;
      }
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: scale(0.8);
        filter: brightness(1.5);
      }
      100% {
        opacity: 1;
        transform: scale(1);
        filter: brightness(1);
      }
    }
  </style>
</head>
<body>
  <div class="container intro-container" id="introContainer">
    <h1>AMBATUMATRIX</h1>
    <input type="text" id="namaInput" placeholder="Masukkan namamu rek" />
    <button class="play-button" onclick="simpanNama()">GASKAN</button>
  </div>

  <canvas id="particleCanvas"></canvas>

  <script>
    function simpanNama() {
        const nama = document.getElementById("namaInput").value;
        if (nama) {
          localStorage.setItem("namaPemain", nama);
          localStorage.setItem("skorBenar", 0);
          localStorage.setItem("skorSalah", 0);
          alert("Nama berhasil disimpan " + nama + "!");
          window.location.href = "../soal/no.1/1.html";
        } else {
          alert("Nama tidak boleh kosong oi!");
        }
      }

    const canvas = document.getElementById("particleCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    class Particle {
      constructor(x, y, size, color, speedX, speedY) {
        this.x = x;
        this.y = y;
        this.size = size;
        this.color = color;
        this.speedX = speedX;
        this.speedY = speedY;
      }
      update(mouse) {
        const dx = this.x - mouse.x;
        const dy = this.y - mouse.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < 100) {
          this.x += dx / distance * 3;
          this.y += dy / distance * 3;
        }
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.closePath();
        ctx.fill();
      }
    }

    function initParticles() {
      particlesArray = [];
      const numParticles = 225;
      for (let i = 0; i < numParticles; i++) {
        const size = Math.random() * 4 + 1;
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const color = `hsl(${Math.random() * 360}, 100%, 50%)`;
        const speedX = Math.random() * 1 - 0.5;
        const speedY = Math.random() * 1 - 0.5;
        particlesArray.push(new Particle(x, y, size, color, speedX, speedY));
      }
    }

    let particlesArray = [];
    initParticles();

    let mouse = { x: null, y: null, radius: 200 };
    window.addEventListener("mousemove", (event) => {
      mouse.x = event.x;
      mouse.y = event.y;
    });

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particlesArray.forEach((particle) => {
        particle.update(mouse);
        particle.draw();
      });
      hueShift();
      requestAnimationFrame(animateParticles);
    }

    function hueShift() {
      particlesArray.forEach((particle) => {
        const hue = (parseInt(particle.color.match(/\d+/)) + 1) % 360;
        particle.color = `hsl(${hue}, 100%, 50%)`;
      });
    }

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      initParticles();
    });

    animateParticles();
  </script>
</body>
</html>
